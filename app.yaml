command:
  - uv
  - run
  - uvicorn
  - backend.app:app
  - --host
  - "0.0.0.0"
  - --port
  - "8000"

env:
  # SQL warehouse the app queries for facility data. Workspace-specific —
  # set this to a warehouse the app's service principal can use (CAN_USE).
  - name: DATABRICKS_WAREHOUSE_ID
    value: "09dcc4e2f84586bd"
